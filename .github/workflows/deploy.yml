name: VLESS Direct Server

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Install Xray
      run: |
        mkdir -p xray
        curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
        unzip -o xray.zip -d xray
        chmod +x xray/xray
        sudo mv xray/xray /usr/local/bin/

    - name: Generate UUID and config
      run: |
        UUID=$(/usr/local/bin/xray uuid)
        echo "UUID=$UUID" >> $GITHUB_ENV
        cat > config.json << EOF
        {
          "inbounds": [
            {
              "port": 443,
              "protocol": "vless",
              "settings": {
                "clients": [{"id": "$UUID"}],
                "decryption": "none"
              }
            }
          ],
          "outbounds": [{"protocol": "freedom"}]
        }
        EOF

    - name: Run Xray
      run: |
        /usr/local/bin/xray run -config config.json &
        sleep 5

    - name: Get IP
      run: |
        IP=$(curl -s ifconfig.me)
        echo "IP=$IP" >> $GITHUB_ENV

    - name: Show config
      run: |
        echo "=========================================="
        echo "VLESS config for V2RayNG:"
        echo "vless://${{ env.UUID }}@${{ env.IP }}:443?encryption=none&security=none&type=tcp#GitHub"
        echo "=========================================="

    - name: Keep alive
      run: sleep 10s
