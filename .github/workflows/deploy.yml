name: Deploy V2Ray with Bore Tunnel

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install V2Ray
      run: |
        mkdir -p v2ray
        curl -L -o v2ray.zip https://github.com/v2fly/v2ray-core/releases/latest/download/v2ray-linux-64.zip
        unzip -o v2ray.zip -d v2ray
        chmod +x v2ray/v2ray

    - name: Create V2Ray config
      run: |
        UUID=$(cat /proc/sys/kernel/random/uuid)
        echo "UUID=$UUID" >> $GITHUB_ENV
        cat > config.json << EOF
        {
          "inbounds": [
            {
              "port": 8080,
              "protocol": "vless",
              "settings": {
                "clients": [
                  {
                    "id": "$UUID",
                    "flow": "xtls-rprx-vision"
                  }
                ],
                "decryption": "none"
              },
              "streamSettings": {
                "network": "ws",
                "wsSettings": {
                  "path": "/"
                }
              }
            }
          ],
          "outbounds": [
            {
              "protocol": "freedom"
            }
          ]
        }
        EOF

    - name: Download and run Bore
      run: |
        curl -L -o bore https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-x86_64-unknown-linux-musl
        chmod +x bore
        # اجرای V2Ray در پس‌زمینه
        ./v2ray/v2ray run -config config.json &
        sleep 5
        echo "🔄 Creating tunnel with bore.pub..."
        ./bore local 8080 --to bore.pub &
        sleep 10
        # لاگ bore را نمایش می‌دهیم (برای دیدن پورت)
        echo "Check the logs below for the port number:"
        ps aux | grep bore
        # این خط workflow را زنده نگه می‌دارد
        sleep 360h

    - name: Keep alive
      run: |
        echo "✅ Service is running. Check the 'Download and run Bore' step for the port."
        sleep 360h
