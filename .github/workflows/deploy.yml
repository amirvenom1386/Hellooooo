name: Deploy V2Ray with Bore Tunnel

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install V2Ray
      run: |
        # دانلود و نصب V2Ray در دایرکتوری فعلی
        curl -L -o v2ray.zip https://github.com/v2fly/v2ray-core/releases/latest/download/v2ray-linux-64.zip
        unzip -o v2ray.zip -d v2ray
        chmod +x v2ray/v2ray
        echo "$(pwd)/v2ray" >> $GITHUB_PATH   # اضافه کردن به PATH

    - name: Create V2Ray config
      run: |
        UUID=$(cat /proc/sys/kernel/random/uuid)
        echo "UUID=$UUID" >> $GITHUB_ENV
        cat > config.json << EOF
        {
          "inbounds": [
            {
              "port": 8080,
              "protocol": "vless",
              "settings": {
                "clients": [
                  {
                    "id": "$UUID",
                    "flow": "xtls-rprx-vision"
                  }
                ],
                "decryption": "none"
              },
              "streamSettings": {
                "network": "ws",
                "wsSettings": {
                  "path": "/"
                }
              }
            }
          ],
          "outbounds": [
            {
              "protocol": "freedom"
            }
          ]
        }
        EOF

    - name: Install Bore
      run: |
        curl -L -o bore https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-x86_64-unknown-linux-musl
        chmod +x bore
        echo "$(pwd)" >> $GITHUB_PATH

    - name: Run V2Ray and Bore
      run: |
        v2ray -config config.json &
        sleep 5
        echo "🔄 Creating tunnel with bore..."
        bore local 8080 --to bore.pub
        sleep 360h
