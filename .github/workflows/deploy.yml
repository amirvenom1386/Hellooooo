name: Deploy Xray VLESS+REALITY (Fixed)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Xray
      run: |
        mkdir -p xray
        curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
        unzip -o xray.zip -d xray
        chmod +x xray/xray
        sudo mv xray/xray /usr/local/bin/

    - name: Generate config and keys (all in one step)
      run: |
        # ایجاد دایرکتوری پیکربندی
        mkdir -p /tmp/xray
        cd /tmp/xray
        
        # تولید کلیدهای REALITY
        /usr/local/bin/xray x25519 > keys.txt
        PRIVATE_KEY=$(grep "Private key:" keys.txt | awk '{print $3}')
        PUBLIC_KEY=$(grep "Public key:" keys.txt | awk '{print $3}')
        UUID=$(/usr/local/bin/xray uuid)
        SHORT_ID=$(openssl rand -hex 8)
        
        # ذخیره کردن در فایل محیطی برای مرحله بعدی (اختیاری)
        echo "PRIVATE_KEY=$PRIVATE_KEY" >> $GITHUB_ENV
        echo "PUBLIC_KEY=$PUBLIC_KEY" >> $GITHUB_ENV
        echo "UUID=$UUID" >> $GITHUB_ENV
        echo "SHORT_ID=$SHORT_ID" >> $GITHUB_ENV
        
        # ساخت config.json
        cat > config.json <<EOF
        {
          "log": {
            "loglevel": "warning"
          },
          "inbounds": [
            {
              "port": 443,
              "protocol": "vless",
              "settings": {
                "clients": [
                  {
                    "id": "$UUID",
                    "flow": "xtls-rprx-vision"
                  }
                ],
                "decryption": "none"
              },
              "streamSettings": {
                "network": "tcp",
                "security": "reality",
                "realitySettings": {
                  "dest": "www.google.com:443",
                  "serverNames": ["www.google.com"],
                  "privateKey": "$PRIVATE_KEY",
                  "shortIds": ["$SHORT_ID"]
                }
              }
            }
          ],
          "outbounds": [
            {
              "protocol": "freedom",
              "tag": "direct"
            }
          ]
        }
        EOF
        
        # بررسی وجود config.json و privateKey
        echo "✅ Config file created at /tmp/xray/config.json"
        echo "PRIVATE_KEY in config: $(grep privateKey config.json)"
        
        # نمایش مقادیر در لاگ (برای اطمینان)
        echo ""
        echo "══════════════════════════════════════════════════════"
        echo "🔑 Generated Keys:"
        echo "UUID: $UUID"
        echo "Private Key (hidden): ${PRIVATE_KEY:0:10}..."
        echo "Public Key: $PUBLIC_KEY"
        echo "Short ID: $SHORT_ID"
        echo "══════════════════════════════════════════════════════"
        
        # ذخیره کردن فایل کانفیگ به عنوان artifact (اختیاری)
        mkdir -p /tmp/artifact
        cp config.json /tmp/artifact/

    - name: Run Xray
      run: |
        /usr/local/bin/xray run -config /tmp/xray/config.json &
        sleep 5
        
        # گرفتن IP عمومی ماشین GitHub Actions
        MY_IP=$(curl -s ifconfig.me)
        
        echo "✅ Xray is running with REALITY protocol"
        echo ""
        echo "══════════════════════════════════════════════════════"
        echo "🔐 YOUR VLESS+REALITY CONFIG (Copy this into V2RayNG):"
        echo ""
        echo "vless://${UUID}@${MY_IP}:443?encryption=none&security=reality&sni=www.google.com&fp=chrome&pbk=${PUBLIC_KEY}&sid=${SHORT_ID}&type=tcp&flow=xtls-rprx-vision#GitHub-REALITY"
        echo ""
        echo "If the above doesn't work, try using the hostname:"
        echo "vless://${UUID}@${GITHUB_RUN_ID}.github.com:443?encryption=none&security=reality&sni=www.google.com&fp=chrome&pbk=${PUBLIC_KEY}&sid=${SHORT_ID}&type=tcp&flow=xtls-rprx-vision#GitHub-REALITY"
        echo "══════════════════════════════════════════════════════"
        
        # نگه داشتن workflow فعال
        sleep 360h

    - name: Upload config (optional)
      uses: actions/upload-artifact@v4
      with:
        name: xray-config
        path: /tmp/artifact/config.json
