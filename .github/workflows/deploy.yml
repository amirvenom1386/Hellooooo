name: Deploy Xray VLESS+REALITY Server

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Docker
      run: |
        curl -fsSL https://get.docker.com -o get-docker.sh
        sudo sh get-docker.sh

    - name: Run Xray with REALITY
      run: |
        docker run -d --name xray-reality -p 443:443 --restart=unless-stopped teddysun/xray \
          -dest www.bing.com:443 \
          -server-names www.bing.com \
          -fingerprint chrome
        sleep 10
        docker logs xray-reality

    - name: Keep alive
      run: sleep 360h
