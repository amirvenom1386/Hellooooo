name: Direct Shadowsocks Server

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Install Shadowsocks-libev
      run: |
        sudo apt update
        sudo apt install -y shadowsocks-libev

    - name: Generate random config
      run: |
        PASSWORD=$(openssl rand -base64 16)
        PORT=8443
        METHOD="chacha20-ietf-poly1305"
        echo "PASSWORD=$PASSWORD" >> $GITHUB_ENV
        echo "PORT=$PORT" >> $GITHUB_ENV
        
        # ساخت فایل کانفیگ
        cat > ss-config.json << EOF
        {
          "server": "0.0.0.0",
          "server_port": $PORT,
          "password": "$PASSWORD",
          "method": "$METHOD",
          "fast_open": true
        }
        EOF

    - name: Start Shadowsocks
      run: |
        sudo ss-server -c ss-config.json -u &
        sleep 5

    - name: Get public IP
      run: |
        MY_IP=$(curl -s ifconfig.me)
        echo "MY_IP=$MY_IP" >> $GITHUB_ENV

    - name: Show connection info
      run: |
        echo "=============================================="
        echo "✅ Shadowsocks server is running"
        echo ""
        echo "🔑 Connection details:"
        echo "   Server IP: ${{ env.MY_IP }}"
        echo "   Port: ${{ env.PORT }}"
        echo "   Password: ${{ env.PASSWORD }}"
        echo "   Method: chacha20-ietf-poly1305"
        echo ""
        echo "📱 For V2RayNG (Android):"
        echo "   Create a new Shadowsocks profile with above info."
        echo ""
        echo "🖥️ For Windows/Linux: use 'ss-local' or 'Shadowsocks' client."
        echo "=============================================="
        echo ""
        echo "⚠️ This server will stay alive for up to 6 hours."
        echo "   After that, re-run this workflow to get a new IP."

    - name: Keep alive
      run: sleep 360h
